name: Force deploy schemas

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build site
        run: ./scripts/publish

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify published URLs
        run: |
          base="${{ steps.deployment.outputs.page_url }}"
          fail=0

          for path in index.html index.md project/index.html project/index.md markspec/index.html markspec/index.md; do
            url="${base}${path}"
            status=$(curl -sL -o /dev/null -w '%{http_code}' "$url")
            if [ "$status" = "200" ]; then
              echo "OK $url"
            else
              echo "FAIL $url (HTTP $status)"
              fail=1
            fi
          done

          for f in $(find _site -name 'v*.json'); do
            url="${base}${f#_site/}"
            status=$(curl -sL -o /dev/null -w '%{http_code}' "$url")
            if [ "$status" = "200" ]; then
              echo "OK $url"
            else
              echo "FAIL $url (HTTP $status)"
              fail=1
            fi
          done
          exit $fail
